<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Art House</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" href="/favicon-32.png" />

  <style>
    :root {
      --bg: #0b0b14;
      --panel: #141420;
      --text: #e6e6eb;
      --muted: #9a9ab0;
      --accent: #6cf0c2;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, #151528, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 3rem 1.5rem 4rem;
    }

    header {
      max-width: 1100px;
      margin: 0 auto 3rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.8rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--muted);
      font-size: 1rem;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 3rem;
    }

    section h2 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.4rem;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.45);
    }

    .card a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card h3 {
      font-size: 1.05rem;
      margin-bottom: 0.35rem;
      color: var(--text);
    }

    .card p {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.4;
    }

    footer {
      margin-top: 4rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <header>
    <h1>ART HOUSE</h1>
    <p>Production & Testnet Environments</p>
  </header>

  <main>
    <section>
      <h2>Production</h2>
      <div class="grid" id="prod-grid"></div>
    </section>

    <section>
      <h2>Testnet</h2>
      <div class="grid" id="testnet-grid"></div>
    </section>
  </main>

  <footer>
    © Art House
  </footer>

  <script>
    async function loadSites() {
      try {
        const res = await fetch('/sites.json', { cache: 'no-store' });
        const data = await res.json();

        renderSection(data.prod || [], 'prod-grid');
        renderSection(data.testnet || [], 'testnet-grid');
      } catch (e) {
        console.error('Failed to load sites.json', e);
      }
    }

    function renderSection(items, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';

      for (const site of items) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <a href="${site.path}">
            <h3>${site.name}</h3>
            <p>${site.description || ''}</p>
          </a>
        `;
        container.appendChild(card);
      }
    }

    loadSites();
  </script>
</body>
</html>
