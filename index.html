<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Art House</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon-32.png" />

  <style>
    /* =========================
       THEME VARIABLES
    ========================== */
    :root {
      --bg: #0b0b14;
      --panel: #141420;
      --text: #e6e6eb;
      --muted: #9a9ab0;
      --accent: #6cf0c2;
      --border: rgba(255,255,255,0.08);
      --gradient-top: #151528;
    }

    [data-theme="light"] {
      --bg: #f5f6fa;
      --panel: #ffffff;
      --text: #1a1a1a;
      --muted: #5c5c6b;
      --accent: #2bbd8c;
      --border: rgba(0,0,0,0.08);
      --gradient-top: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, var(--gradient-top), var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 3rem 1.5rem 4rem;
      transition: background 0.35s ease, color 0.35s ease;
    }

    /* =========================
       THEME TOGGLE
    ========================== */
    .theme-toggle {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--panel);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background 0.3s ease, border-color 0.3s ease;
      z-index: 10;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
    }

    .theme-icon {
      font-size: 1.1rem;
      transition: transform 0.45s cubic-bezier(.4,0,.2,1), opacity 0.25s;
    }

    .theme-toggle.rotate .theme-icon {
      transform: rotate(180deg) scale(1.15);
    }

    header {
      max-width: 1100px;
      margin: 0 auto 3rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.8rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--muted);
      font-size: 1rem;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 3rem;
    }

    section h2 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.4rem;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.25);
    }

    .card a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card h3 {
      font-size: 1.05rem;
      margin-bottom: 0.35rem;
    }

    .card p {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.4;
    }

    footer {
      margin-top: 4rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* =========================
       ACTIVE NFT'S TICKER (MAINNET)
    ========================== */
    .ticker-wrap {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.1rem;
      margin-bottom: 1.25rem;
      overflow: hidden;
    }

    .ticker-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.65rem;
    }

    .ticker-title {
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
    }

    .ticker-status {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .ticker {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.12);
    }

    [data-theme="light"] .ticker {
      background: rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.06);
    }

    .ticker::before,
    .ticker::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 48px;
      z-index: 2;
      pointer-events: none;
    }

    .ticker::before {
      left: 0;
      background: linear-gradient(90deg, rgba(11,11,20,0.85), rgba(11,11,20,0));
    }

    .ticker::after {
      right: 0;
      background: linear-gradient(270deg, rgba(11,11,20,0.85), rgba(11,11,20,0));
    }

    [data-theme="light"] .ticker::before {
      background: linear-gradient(90deg, rgba(245,246,250,0.95), rgba(245,246,250,0));
    }
    [data-theme="light"] .ticker::after {
      background: linear-gradient(270deg, rgba(245,246,250,0.95), rgba(245,246,250,0));
    }

    .ticker-track {
      display: inline-flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.75rem 0.9rem;
      white-space: nowrap;
      will-change: transform;
      animation: marquee var(--marquee-duration, 30s) linear infinite;
    }

    .ticker:hover .ticker-track {
      animation-play-state: paused;
    }

    @keyframes marquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.35rem 0.6rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      font-size: 0.88rem;
      color: var(--text);
    }

    [data-theme="light"] .ticker-item {
      background: rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.08);
    }

    .ticker-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,240,194,0.12);
    }

    .ticker-empty {
      padding: 0.75rem 0.9rem;
      color: var(--muted);
      font-size: 0.88rem;
    }
  </style>
</head>

<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span class="theme-icon" id="themeIcon">🌙</span>
  </button>

  <header>
    <h1>ART HOUSE</h1>
    <p>Mainnet &amp; Testnet Environments</p>
  </header>

  <main>
    <section>
      <h2>Mainnet</h2>

      <!-- ACTIVE NFT'S banner (scrolling ticker) -->
      <div class="ticker-wrap" aria-label="Active NFT collections">
        <div class="ticker-header">
          <div class="ticker-title">ACTIVE NFT'S</div>
          <div class="ticker-status" id="nftStatus">Loading onchain collections…</div>
        </div>
        <div class="ticker" role="region" aria-label="Active NFTs scrolling banner">
          <div class="ticker-track" id="nftTickerTrack">
            <div class="ticker-empty">Loading…</div>
          </div>
        </div>
      </div>

      <div class="grid" id="Mainnet-grid"></div>
    </section>

    <section>
      <h2>Testnet</h2>
      <div class="grid" id="testnet-grid"></div>
    </section>
  </main>

  <footer>
    © Art House
  </footer>

  <!-- Ethers.js (browser) -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>

  <script>
    /* =========================
       COOKIE HELPERS
    ========================== */
    function setThemeCookie(value) {
      const baseDomain = location.hostname.split('.').slice(-2).join('.');
      // Avoid invalid domain attribute on localhost/dev
      const domainPart = (location.hostname.includes('.') ? `; domain=.${baseDomain}` : '');
      document.cookie = `theme=${value}; path=/; max-age=31536000; SameSite=Lax${domainPart}`;
    }

    function getThemeCookie() {
      return document.cookie
        .split('; ')
        .find(row => row.startsWith('theme='))
        ?.split('=')[1];
    }

    /* =========================
       THEME HANDLING
    ========================== */
    const root = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const icon = document.getElementById('themeIcon');

    const systemPrefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
    const savedTheme = getThemeCookie() || localStorage.getItem('theme');
    const initialTheme = savedTheme || (systemPrefersLight ? 'light' : 'dark');

    applyTheme(initialTheme);

    toggle.addEventListener('click', () => {
      toggle.classList.add('rotate');
      const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      applyTheme(next);
      setTimeout(() => toggle.classList.remove('rotate'), 450);
    });

    function applyTheme(theme) {
      root.setAttribute('data-theme', theme);
      icon.textContent = theme === 'light' ? '☀️' : '🌙';
      localStorage.setItem('theme', theme);
      setThemeCookie(theme);
    }

    /* =========================
       SITE LOADING
    ========================== */
    async function loadSites() {
      try {
        const res = await fetch('/sites.json', { cache: 'no-store' });
        const data = await res.json();
        renderSection(data.Mainnet || [], 'Mainnet-grid');
        renderSection(data.testnet || [], 'testnet-grid');
      } catch (e) {
        console.error('Failed to load sites.json', e);
      }
    }

    function renderSection(items, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      for (const site of items) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <a href="${site.path}">
            <h3>${site.name}</h3>
            <p>${site.description || ''}</p>
          </a>
        `;
        container.appendChild(card);
      }
    }

    const nftStatusEl = document.getElementById('nftStatus');
    const nftTrackEl = document.getElementById('nftTickerTrack');
    const tickerRootEl = document.querySelector('.ticker-track');

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, s => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[s]));
    }

    async function getProvider() {
      // Prefer injected wallet provider (read-only, no prompt)
      if (window.ethereum) {
        const browserProvider = new ethers.BrowserProvider(window.ethereum);
        try {
          const net = await browserProvider.getNetwork();
          // If user is on a different chain, still allow fallback read from mainnet:
          if (net && Number(net.chainId) !== 1) {
            return new ethers.JsonRpcProvider("https://cloudflare-eth.com");
          }
        } catch (_) {
          // if any issue, fallback
          return new ethers.JsonRpcProvider("https://cloudflare-eth.com");
        }
        return browserProvider;
      }
      // Fallback public mainnet RPC
      return new ethers.JsonRpcProvider("https://cloudflare-eth.com");
    }

    function renderTicker(names) {
      const unique = Array.from(new Set(names.filter(Boolean).map(n => n.trim()).filter(n => n.length)));

      if (!unique.length) {
        nftStatusEl.textContent = "No collections recorded yet.";
        nftTrackEl.innerHTML = `<div class="ticker-empty">No active NFT collections found.</div>`;
        // Stop marquee animation when empty
        nftTrackEl.style.animation = "none";
        return;
      }

      nftStatusEl.textContent = `${unique.length} collection${unique.length === 1 ? '' : 's'} recorded`;

      // Build items once
      const itemsHtml = unique.map(name => `
        <span class="ticker-item" title="${escapeHtml(name)}">
          <span class="ticker-dot" aria-hidden="true"></span>
          <span>${escapeHtml(name)}</span>
        </span>
      `).join('');

      // Duplicate content to ensure seamless marquee (track moves -50%)
      nftTrackEl.innerHTML = itemsHtml + itemsHtml;

      // Tune duration roughly by content length
      const roughLen = unique.join(' • ').length;
      const duration = Math.min(80, Math.max(20, roughLen * 0.22)); // 20s..80s
      nftTrackEl.style.setProperty('--marquee-duration', `${duration}s`);
      nftTrackEl.style.animation = ""; // re-enable in case it was disabled
    }

    async function loadActiveNfts() {
      nftStatusEl.textContent = "Loading onchain collections…";
      nftTrackEl.innerHTML = `<div class="ticker-empty">Loading…</div>`;

      try {
        const provider = await getProvider();
        const contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, provider);

        const collections = await contract.getCollections();

        // collections: array of tuples { nftContract, name }
        const names = (collections || []).map(entry => {
          // ethers v6 tuple can be accessed via entry.name OR entry[1]
          return (entry && (entry.name ?? entry[1])) || "";
        });

        renderTicker(names);
      } catch (err) {
        console.error("Failed to load getCollections()", err);
        nftStatusEl.textContent = "Failed to load onchain collections.";
        nftTrackEl.innerHTML = `<div class="ticker-empty">Unable to fetch collections from mainnet.</div>`;
        nftTrackEl.style.animation = "none";
      }
    }

    // Load both sections
    loadSites();
    loadActiveNfts();

    // Optional: refresh ticker periodically (keeps banner up to date if new collections get recorded)
    setInterval(loadActiveNfts, 60_000);
  </script>
</body>
</html>
