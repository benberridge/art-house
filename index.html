<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Art House</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon-32.png" />

  <style>
    /* =========================
       THEME VARIABLES
    ========================== */
    :root {
      --bg: #0b0b14;
      --panel: #141420;
      --text: #e6e6eb;
      --muted: #9a9ab0;
      --accent: #6cf0c2;
      --border: rgba(255,255,255,0.08);
      --gradient-top: #151528;
    }

    [data-theme="light"] {
      --bg: #f5f6fa;
      --panel: #ffffff;
      --text: #1a1a1a;
      --muted: #5c5c6b;
      --accent: #2bbd8c;
      --border: rgba(0,0,0,0.08);
      --gradient-top: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, var(--gradient-top), var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 3rem 1.5rem 4rem;
      transition: background 0.35s ease, color 0.35s ease;
    }

    /* =========================
       THEME TOGGLE
    ========================== */
    .theme-toggle {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--panel);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
    }

    .theme-icon {
      font-size: 1.1rem;
      transition: transform 0.45s cubic-bezier(.4,0,.2,1), opacity 0.25s;
    }

    .theme-toggle.rotate .theme-icon {
      transform: rotate(180deg) scale(1.15);
    }

    header {
      max-width: 1100px;
      margin: 0 auto 3rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.8rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--muted);
      font-size: 1rem;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 3rem;
    }

    section h2 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.4rem;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.25);
    }

    .card a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card h3 {
      font-size: 1.05rem;
      margin-bottom: 0.35rem;
    }

    .card p {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.4;
    }

    footer {
      margin-top: 4rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span class="theme-icon" id="themeIcon">🌙</span>
  </button>

  <header>
    <h1>ART HOUSE</h1>
    <p>Where the Art Hangs</p>
  </header>

  <main>
    <section>
      <h2>Mainnet</h2>
      <div class="grid" id="Mainnet-grid"></div>
    </section>

    <section>
      <h2>Testnet</h2>
      <div class="grid" id="testnet-grid"></div>
    </section>
  </main>

  <footer>
    Art House
  </footer>

  <script>
    /* =========================
       COOKIE HELPERS
    ========================== */
    function setThemeCookie(value) {
      document.cookie =
        `theme=${value}; path=/; max-age=31536000; SameSite=Lax; domain=.${location.hostname.split('.').slice(-2).join('.')}`;
    }

    function getThemeCookie() {
      return document.cookie
        .split('; ')
        .find(row => row.startsWith('theme='))
        ?.split('=')[1];
    }

    /* =========================
       THEME HANDLING
    ========================== */
    const root = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const icon = document.getElementById('themeIcon');

    const systemPrefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
    const savedTheme = getThemeCookie() || localStorage.getItem('theme');
    const initialTheme = savedTheme || (systemPrefersLight ? 'light' : 'dark');

    applyTheme(initialTheme);

    toggle.addEventListener('click', () => {
      toggle.classList.add('rotate');
      const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      applyTheme(next);
      setTimeout(() => toggle.classList.remove('rotate'), 450);
    });

    function applyTheme(theme) {
      root.setAttribute('data-theme', theme);
      icon.textContent = theme === 'light' ? '☀️' : '🌙';
      localStorage.setItem('theme', theme);
      setThemeCookie(theme);
    }

    /* =========================
       SITE LOADING
    ========================== */
    async function loadSites() {
      try {
        const res = await fetch('/sites.json', { cache: 'no-store' });
        const data = await res.json();
        renderSection(data.Mainnet || [], 'Mainnet-grid');
        renderSection(data.testnet || [], 'testnet-grid');
      } catch (e) {
        console.error('Failed to load sites.json', e);
      }
    }

    function renderSection(items, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      for (const site of items) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <a href="${site.path}">
            <h3>${site.name}</h3>
            <p>${site.description || ''}</p>
          </a>
        `;
        container.appendChild(card);
      }
    }

    loadSites();
  </script>
</body>
</html>
