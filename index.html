<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Art House</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon-32.png" />

  <style>
    /* =========================
       THEME VARIABLES
    ========================== */
    :root {
      --bg: #0b0b14;
      --panel: #141420;
      --text: #e6e6eb;
      --muted: #9a9ab0;
      --accent: #6cf0c2;
      --border: rgba(255,255,255,0.08);
      --gradient-top: #151528;
    }

    [data-theme="light"] {
      --bg: #f5f6fa;
      --panel: #ffffff;
      --text: #1a1a1a;
      --muted: #5c5c6b;
      --accent: #2bbd8c;
      --border: rgba(0,0,0,0.08);
      --gradient-top: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, var(--gradient-top), var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 3rem 1.5rem 4rem;
      transition: background 0.35s ease, color 0.35s ease;
    }

    /* =========================
       THEME TOGGLE
    ========================== */
    .theme-toggle {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--panel);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background 0.3s ease, border-color 0.3s ease;
      z-index: 10;
    }

    .theme-toggle:hover { border-color: var(--accent); }

    .theme-icon {
      font-size: 1.1rem;
      transition: transform 0.45s cubic-bezier(.4,0,.2,1), opacity 0.25s;
    }

    .theme-toggle.rotate .theme-icon {
      transform: rotate(180deg) scale(1.15);
    }

    header {
      max-width: 1100px;
      margin: 0 auto 3rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.8rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--muted);
      font-size: 1rem;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 3rem;
    }

    section h2 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.4rem;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.25);
    }

    .card a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card h3 {
      font-size: 1.05rem;
      margin-bottom: 0.35rem;
    }

    .card p {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.4;
    }

    footer {
      margin-top: 4rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* =========================
       ACTIVE NFT'S TICKER (MAINNET)
    ========================== */
    .ticker-wrap {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.1rem;
      margin-bottom: 1.25rem;
      overflow: hidden;
    }

    .ticker-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.65rem;
    }

    .ticker-title {
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
    }

    .ticker-status {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .ticker {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.12);
    }

    [data-theme="light"] .ticker {
      background: rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.06);
    }

    .ticker::before,
    .ticker::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 48px;
      z-index: 2;
      pointer-events: none;
    }

    .ticker::before {
      left: 0;
      background: linear-gradient(90deg, rgba(11,11,20,0.85), rgba(11,11,20,0));
    }

    .ticker::after {
      right: 0;
      background: linear-gradient(270deg, rgba(11,11,20,0.85), rgba(11,11,20,0));
    }

    [data-theme="light"] .ticker::before {
      background: linear-gradient(90deg, rgba(245,246,250,0.95), rgba(245,246,250,0));
    }
    [data-theme="light"] .ticker::after {
      background: linear-gradient(270deg, rgba(245,246,250,0.95), rgba(245,246,250,0));
    }

    .ticker-track {
      display: inline-flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.75rem 0.9rem;
      white-space: nowrap;
      will-change: transform;
      animation: marquee var(--marquee-duration, 34s) linear infinite;
    }

    .ticker:hover .ticker-track { animation-play-state: paused; }

    @keyframes marquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.35rem 0.6rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      font-size: 0.88rem;
      color: var(--text);
      max-width: 420px;
    }

    [data-theme="light"] .ticker-item {
      background: rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.08);
    }

    .ticker-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,240,194,0.12);
      flex: 0 0 auto;
    }

    .ticker-empty {
      padding: 0.75rem 0.9rem;
      color: var(--muted);
      font-size: 0.88rem;
    }
  </style>
</head>

<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span class="theme-icon" id="themeIcon">🌙</span>
  </button>

  <header>
    <h1>ART HOUSE</h1>
    <p>Mainnet &amp; Testnet Environments</p>
  </header>

  <main>
    <section>
      <h2>Mainnet</h2>

      <!-- ACTIVE NFT'S banner (scrolling ticker) -->
      <div class="ticker-wrap" aria-label="Active NFT collections">
        <div class="ticker-header">
          <div class="ticker-title">ACTIVE NFT'S</div>
          <div class="ticker-status" id="nftStatus">Loading onchain collections…</div>
        </div>

        <div class="ticker" role="region" aria-label="Active NFTs scrolling banner">
          <div class="ticker-track" id="nftTickerTrack">
            <div class="ticker-empty">Loading…</div>
          </div>
        </div>
      </div>

      <div class="grid" id="Mainnet-grid"></div>
    </section>

    <section>
      <h2>Testnet</h2>
      <div class="grid" id="testnet-grid"></div>
    </section>
  </main>

  <footer>
    © Art House
  </footer>

  <script>
    /* =========================
       COOKIE HELPERS (robust base-domain)
    ========================== */
    function getCookie(name) {
      const m = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
      return m ? decodeURIComponent(m[2]) : null;
    }

    function baseDomain(host) {
      if (!host || host === "localhost") return null;
      if (/^\d{1,3}(\.\d{1,3}){3}$/.test(host) || host.includes(":")) return null;

      const parts = host.split(".").filter(Boolean);
      if (parts.length < 2) return null;

      const last2 = parts.slice(-2).join(".");
      const last3 = parts.slice(-3).join(".");

      const sldTlds = new Set([
        "co.uk","org.uk","ac.uk","gov.uk","net.uk",
        "com.au","net.au","org.au",
        "co.nz","com.br","co.jp"
      ]);

      if (sldTlds.has(last2) && parts.length >= 3) return last3;
      return last2;
    }

    function setThemeCookie(value) {
      const base = baseDomain(location.hostname);
      let cookie = `theme=${encodeURIComponent(value)}; path=/; max-age=31536000; SameSite=Lax`;
      if (location.protocol === "https:") cookie += "; Secure";
      if (base) cookie += `; domain=.${base}`;
      document.cookie = cookie;
    }

    function getThemeCookie() {
      return getCookie("theme");
    }

    /* =========================
       THEME HANDLING
    ========================== */
    const root = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const icon = document.getElementById('themeIcon');

    const systemPrefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
    const savedTheme = getThemeCookie() || localStorage.getItem('theme');
    const initialTheme = savedTheme || (systemPrefersLight ? 'light' : 'dark');

    applyTheme(initialTheme);

    toggle.addEventListener('click', () => {
      toggle.classList.add('rotate');
      const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      applyTheme(next);
      setTimeout(() => toggle.classList.remove('rotate'), 450);
    });

    function applyTheme(theme) {
      root.setAttribute('data-theme', theme);
      icon.textContent = theme === 'light' ? '☀️' : '🌙';
      localStorage.setItem('theme', theme);
      try { setThemeCookie(theme); } catch {}
    }

    /* =========================
       SITE LOADING
    ========================== */
    async function loadSites() {
      try {
        const res = await fetch('/sites.json', { cache: 'no-store' });
        const data = await res.json();
        renderSection(data.Mainnet || [], 'Mainnet-grid');
        renderSection(data.testnet || [], 'testnet-grid');
      } catch (e) {
        console.error('Failed to load sites.json', e);
      }
    }

    function renderSection(items, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      for (const site of items) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <a href="${site.path}">
            <h3>${site.name}</h3>
            <p>${site.description || ''}</p>
          </a>
        `;
        container.appendChild(card);
      }
    }
  </script>

  <!-- Use ethers v5 ESM from jsDelivr (same pattern as your working reference page) -->
  <script type="module">
    import { ethers } from 'https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.esm.min.js';

    /* =========================
       ONCHAIN: ACTIVE NFT'S TICKER (SONIC MAINNET)
    ========================== */
    const CONTRACT_ADDRESS = "0x3eB04112393e5Ea3A04B70d887589F5e8c4c65b4";
    const SONIC_RPC = "https://rpc.soniclabs.com";

    // We only need the read methods for the banner; keep it small and reliable
    const ABI = [
      "function getCollections() view returns (tuple(address nftContract,string name)[])",
      "function getCollectionCount() view returns (uint256)",
      "function getCollectionsRange(uint256 start,uint256 count) view returns (tuple(address nftContract,string name)[])"
    ];

    const nftStatusEl = document.getElementById('nftStatus');
    const nftTrackEl = document.getElementById('nftTickerTrack');

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, s => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[s]));
    }

    function renderTicker(names) {
      const unique = Array.from(new Set(
        (names || [])
          .filter(Boolean)
          .map(n => n.trim())
          .filter(n => n.length)
      ));

      if (!unique.length) {
        nftStatusEl.textContent = "No collections recorded yet.";
        nftTrackEl.innerHTML = `<div class="ticker-empty">No active NFT collections found.</div>`;
        nftTrackEl.style.animation = "none";
        return;
      }

      nftStatusEl.textContent = `${unique.length} collection${unique.length === 1 ? '' : 's'} recorded`;

      const itemsHtml = unique.map(name => `
        <span class="ticker-item" title="${escapeHtml(name)}">
          <span class="ticker-dot" aria-hidden="true"></span>
          <span>${escapeHtml(name)}</span>
        </span>
      `).join('');

      // Duplicate for seamless loop (track moves -50%)
      nftTrackEl.innerHTML = itemsHtml + itemsHtml;

      // Adjust speed based on content length
      const roughLen = unique.join(' • ').length;
      const duration = Math.min(90, Math.max(24, roughLen * 0.22)); // 24s..90s
      nftTrackEl.style.setProperty('--marquee-duration', `${duration}s`);
      nftTrackEl.style.animation = ""; // ensure enabled
    }

    async function fetchCollectionsViaGetCollections(contract) {
      // Preferred: direct getCollections()
      const rows = await contract.getCollections();
      return (rows || []).map(r => (r && r.name) ? String(r.name) : "");
    }

    async function fetchCollectionsViaPaging(contract) {
      // Fallback: getCollectionCount + getCollectionsRange paging
      const totalBN = await contract.getCollectionCount();
      const total = totalBN.toNumber ? totalBN.toNumber() : Number(totalBN);

      const PAGE = 200;
      const names = [];

      for (let start = 0; start < total; start += PAGE) {
        const count = Math.min(PAGE, total - start);
        const page = await contract.getCollectionsRange(start, count);
        for (const item of (page || [])) {
          const nm = item && item.name ? String(item.name).trim() : "";
          if (nm) names.push(nm);
        }
      }
      return names;
    }

    async function loadActiveNfts() {
      nftStatusEl.textContent = "Loading onchain collections…";
      nftTrackEl.innerHTML = `<div class="ticker-empty">Loading…</div>`;

      try {
        const provider = new ethers.providers.JsonRpcProvider(SONIC_RPC);
        const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);

        let names = [];
        try {
          names = await fetchCollectionsViaGetCollections(contract);
        } catch (e) {
          // If getCollections() is not available / too heavy / reverts, use paging
          console.warn("getCollections() failed, falling back to paging:", e);
          names = await fetchCollectionsViaPaging(contract);
        }

        renderTicker(names);
      } catch (err) {
        console.error("Failed to load collections:", err);
        nftStatusEl.textContent = "Unable to fetch collections from mainnet.";
        nftTrackEl.innerHTML = `<div class="ticker-empty">Unable to fetch collections.</div>`;
        nftTrackEl.style.animation = "none";
      }
    }

    // Boot
    loadActiveNfts();
    // Refresh occasionally
    setInterval(loadActiveNfts, 60_000);
  </script>

  <script>
    // Boot sites.json after module has loaded (safe either way)
    loadSites();
  </script>
</body>
</html>
